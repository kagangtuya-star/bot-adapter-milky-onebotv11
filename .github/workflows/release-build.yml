name: Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: milky-ob11-bridge

concurrency:
  group: release-build-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - name: Resolve target release
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === "release") {
              const tagName = context.payload.release?.tag_name;
              if (!tagName) {
                core.setFailed("release event is missing tag_name");
                return;
              }
              core.setOutput("tag_name", tagName);
              return;
            }

            try {
              const { data: release } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput("tag_name", release.tag_name);
            } catch (error) {
              core.setFailed(`failed to resolve latest release: ${error.message}`);
            }

  build:
    needs: resolve-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            ext: ""
          - goos: linux
            goarch: arm64
            archive: tar.gz
            ext: ""
          - goos: windows
            goarch: amd64
            archive: zip
            ext: .exe
          - goos: windows
            goarch: arm64
            archive: zip
            ext: .exe
          - goos: darwin
            goarch: amd64
            archive: tar.gz
            ext: ""
          - goos: darwin
            goarch: arm64
            archive: tar.gz
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test ./...

      - name: Build package
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BIN_EXT: ${{ matrix.ext }}
          ARCHIVE_TYPE: ${{ matrix.archive }}
          TAG_NAME: ${{ needs.resolve-release.outputs.tag_name }}
        run: |
          set -euo pipefail

          base_name="${APP_NAME}_${TAG_NAME}_${GOOS}_${GOARCH}"
          package_dir="dist/${base_name}"
          binary_name="${APP_NAME}${BIN_EXT}"
          archive_path="dist/${base_name}.${ARCHIVE_TYPE}"

          rm -rf dist
          mkdir -p "${package_dir}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath -ldflags="-s -w" \
            -o "${package_dir}/${binary_name}" \
            ./cmd/milky-ob11-bridge

          cp README.md "${package_dir}/README.md"
          cp config.example.json "${package_dir}/config.example.json"

          if [ "${ARCHIVE_TYPE}" = "zip" ]; then
            (
              cd dist
              zip -rq "${base_name}.zip" "${base_name}"
            )
          else
            tar -C dist -czf "${archive_path}" "${base_name}"
          fi

          sha256sum "${archive_path}" > "${archive_path}.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    needs:
      - resolve-release
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag_name }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
